    <style>
        @media only screen and (min-width: 320px){
            nav{
                display: flex;
                height: 10rem;
                justify-content: end;
                width: 320px;
                display: flex;
                align-items: center;
            }
            details{
                display: flex;
                list-style: none;
                flex-direction: column;
                width: 100%;
                height: 100%;
                justify-content: center;
                align-items: center;
            }
            details summary{
                padding: 1rem;
                background-image: url(./src/more.png);

                background-size: cover;
                width: 1rem;
                height: 1rem;
            }
            details .burger-list{
                padding-bottom: 1rem;
            }
            .burger{
                display: flex;
                background-position: center;
                background-size: cover;
                background-repeat: no-repeat;
                padding-bottom: 10rem;
            }
            .burger img{

            .Logo{
